            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.datasources.getDatasourceInstanceConfiguration("o365sharepoint", "o365sharepoint_abc123");

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Datasources.GetDatasourceInstanceConfiguration(ctx, \"o365sharepoint\", \"o365sharepoint_abc123\")\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.DatasourceConfigurationResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.errors.ErrorResponse;
            import com.glean.api_client.glean_api_client.models.operations.GetDatasourceInstanceConfigurationResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws ErrorResponse, Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    GetDatasourceInstanceConfigurationResponse res = sdk.datasources().getDatasourceInstanceConfiguration()
                            .datasourceId("o365sharepoint")
                            .instanceId("o365sharepoint_abc123")
                            .call();

                    if (res.datasourceConfigurationResponse().isPresent()) {
