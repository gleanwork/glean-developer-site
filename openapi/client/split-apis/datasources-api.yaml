  /rest/api/v1/datasource/{datasourceInstanceId}/credentials:
    post:
      operationId: rotateDatasourceCredentials
      summary: Rotate datasource instance credentials
      description: |
        Rotates the credentials that a datasource instance uses to connect to its upstream system. Replaces the active credential material with the supplied values and returns the credential status after rotation. Access is limited to callers with the ADMIN scope; the handler enforces this check.
        Only keys recognized as credential material for the datasource type may be set in `credentials.values` (e.g. `clientSecret`, `apiToken`, `privateKey`, depending on the configured auth method). Unrecognized keys, or keys that correspond to non-credential configuration, cause a 400; other instance configuration must be updated via PATCH /configure/datasources/{datasourceId}/instances/{instanceId}.
      tags:
        - Datasources
      security:
        - APIToken: []
      parameters:
        - $ref: '#/components/parameters/datasourceInstanceId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateDatasourceCredentialsRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasourceCredentialStatusResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Datasource instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-visibility: Preview
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.datasources.rotate_datasource_credentials(datasource_instance_id="o365sharepoint_abc123", credentials={
                    "values": {
                        "key": {},
                    },
                })

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.datasources.rotateDatasourceCredentials({
                credentials: {
                  values: {
                    "key": {},
                  },
                },
              }, "o365sharepoint_abc123");

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"github.com/gleanwork/api-client-go/models/components\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Datasources.RotateDatasourceCredentials(ctx, \"o365sharepoint_abc123\", components.RotateDatasourceCredentialsRequest{\n        Credentials: components.DatasourceInstanceConfiguration{\n            Values: map[string]components.ConfigurationValue{\n                \"key\": components.ConfigurationValue{},\n            },\n        },\n    })\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.DatasourceCredentialStatusResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.components.*;
            import com.glean.api_client.glean_api_client.models.errors.ErrorResponse;
            import com.glean.api_client.glean_api_client.models.operations.RotateDatasourceCredentialsResponse;
            import java.lang.Exception;
            import java.util.Map;

            public class Application {

                public static void main(String[] args) throws ErrorResponse, Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    RotateDatasourceCredentialsResponse res = sdk.datasources().rotateDatasourceCredentials()
                            .datasourceInstanceId("o365sharepoint_abc123")
                            .rotateDatasourceCredentialsRequest(RotateDatasourceCredentialsRequest.builder()
                                .credentials(DatasourceInstanceConfiguration.builder()
                                    .values(Map.ofEntries(
                                        Map.entry("key", ConfigurationValue.builder()
                                            .build())))
                                    .build())
                                .build())
                            .call();

                    if (res.datasourceCredentialStatusResponse().isPresent()) {
                        System.out.println(res.datasourceCredentialStatusResponse().get());
                    }
                }
            }
components:
  schemas:
    DatasourceCredentialStatus:
      type: string
      enum:
        - VALID
        - VALID_WITH_WARNINGS
        - VALIDATING
        - INVALID
        - MISSING
      description: |
        Lifecycle state of the credentials installed for a datasource instance. Mirrors the internal admin Status enum so the handler can surface the same health signals already tracked today. EXPIRING_SOON is represented as VALID_WITH_WARNINGS (with detail in `message`); EXPIRED is surfaced as INVALID plus a non-null `expiresAt` in the past.
    ErrorResponse:
      type: object
      description: Error response returned for failed requests
      properties:
        message:
          type: string
          description: Client-facing error message describing what went wrong
    ConfigurationValue:
      type: object
      properties:
        value:
          type: string
          description: The configuration value as a string. Only one of value or valueList should be populated.
        valueList:
          type: array
          items:
            type: string
          description: The configuration value as a list of strings. Only one of value or valueList should be populated.
      description: A single configuration value, either a scalar or a list
    RotateDatasourceCredentialsRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/DatasourceInstanceConfiguration'
      required:
        - credentials
      description: |
        Request to rotate the credentials used by a datasource instance. Replaces the active credential material with the supplied values.
        `credentials.values` must contain only keys recognized as credential material for the datasource type (for example `clientSecret` for OAuth, `apiToken` for API-token auth, `privateKey` for certificate auth). Unrecognized keys, or keys that correspond to non-credential configuration, cause a 400; use the configure endpoint to change non-credential config.
    UpdateDatasourceConfigurationRequest:
      type: object
      properties:
        configuration:
          $ref: '#/components/schemas/DatasourceInstanceConfiguration'
      required:
        - configuration
      description: |
        Request to update greenlisted configuration values for a datasource instance. Only keys that are exposed via the public API greenlist may be set.
    ConfigurationValues:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ConfigurationValue'
      description: A map from configuration key names to their values
    DatasourceConfigurationResponse:
      type: object
      properties:
        configuration:
          $ref: '#/components/schemas/DatasourceInstanceConfiguration'
      required:
        - configuration
      description: |
        The greenlisted configuration values for a datasource instance. Only keys that are exposed via the public API greenlist are included.
    DatasourceInstanceConfiguration:
      type: object
      properties:
        values:
          $ref: '#/components/schemas/ConfigurationValues'
      required:
        - values
      description: Configuration for a datasource instance
    DatasourceCredentialStatusResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/DatasourceCredentialStatus'
        lastRotatedAt:
          type: string
          format: date-time
          description: When the credentials were last rotated. Omitted when not known.
        expiresAt:
          type: string
          format: date-time
          description: |
            When the active credentials expire. Omitted when not known or not applicable to this credential type.
        message:
          type: string
          description: Optional human-readable detail about the current credential status.
      required:
        - status
      description: Status of the credentials currently installed for a datasource instance.
  securitySchemes:
    APIToken:
      scheme: bearer
      type: http
  parameters:
    datasourceId:
      name: datasourceId
      in: path
      description: The datasource type identifier (e.g. o365sharepoint)
      required: true
      schema:
        type: string
        example: o365sharepoint
    instanceId:
      name: instanceId
      in: path
      description: The datasource instance identifier
      required: true
      schema:
        type: string
        example: o365sharepoint_abc123
    datasourceInstanceId:
      name: datasourceInstanceId
      in: path
      description: The full datasource instance identifier (e.g. o365sharepoint_abc123)
      required: true
      schema:
        type: string
        example: o365sharepoint_abc123
