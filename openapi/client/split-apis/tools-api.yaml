openapi: 3.0.0
info:
  version: 0.9.0
  title: Glean API - Tools
  x-source-commit-sha: d1aadcde4a5e89e3599c543739ed5c01f999caa2
  description: API endpoints for Tools
  x-logo:
    url: https://app.glean.com/images/glean-text2.svg
  x-open-api-commit-sha: 11c79c40fdb8a2b4dcd60af90ce6e9a907864bf1
  x-speakeasy-name: Glean API
servers:
  - url: https://{instance}-be.glean.com
    variables:
      instance:
        default: instance-name
        description: The instance name (typically the email domain without the TLD) that determines the deployment backend.
security: []
paths:
  /rest/api/v1/tools/list:
    get:
      tags:
        - Tools
        - Tools
      summary: List available tools
      description: Returns a filtered set of available tools based on optional tool name parameters. If no filters are provided, all available tools are returned.
      x-visibility: Preview
      parameters:
        - in: query
          name: toolNames
          description: Optional array of tool names to filter by
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolsListResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '429':
          description: Too Many Requests
      security:
        - APIToken: []
      x-speakeasy-name-override: list
      x-speakeasy-group: client.tools
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.client.tools.list()

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.client.tools.list();

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Client.Tools.List(ctx, nil)\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.ToolsListResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.operations.GetRestApiV1ToolsListResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    GetRestApiV1ToolsListResponse res = sdk.client().tools().list()
                            .call();

                    if (res.toolsListResponse().isPresent()) {
                        System.out.println(res.toolsListResponse().get());
                    }
                }
            }
