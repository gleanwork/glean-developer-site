                            .call();

                    if (res.actionPackAuthStatusResponse().isPresent()) {
                        System.out.println(res.actionPackAuthStatusResponse().get());
                    }
                }
            }
    post:
      tags:
        - Tools
      summary: Start the OAuth authorization flow for an action pack.
      description: |
        Starts the third-party OAuth flow for the specified action pack and returns the
        redirect URL that the client should navigate the end user to. After the OAuth
        callback completes, the user's browser is redirected back to `returnUrl` with a
        status query parameter (`?glean_action_auth=success|error&actionPackId=...`).

        `returnUrl` must match the tenant's configured return URL allowlist; otherwise the
        request is rejected with 400.
      operationId: authorizeActionPack
      x-visibility: Preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeActionPackRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeActionPackResponse'
        '400':
          description: Invalid request (e.g. returnUrl not in allowlist, unsupported auth type)
        '401':
          description: Unauthorized
        '403':
          description: User not entitled to the action pack
        '404':
          description: Action pack not found
        '429':
          description: Too Many Requests
      security:
        - APIToken: []
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.tools.authorize_action_pack(action_pack_id="<id>", return_url="https://merry-allocation.org/")

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.tools.authorizeActionPack({
                returnUrl: "https://merry-allocation.org/",
              }, "<id>");

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"github.com/gleanwork/api-client-go/models/components\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Tools.AuthorizeActionPack(ctx, \"<id>\", components.AuthorizeActionPackRequest{\n        ReturnURL: \"https://merry-allocation.org/\",\n    })\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.AuthorizeActionPackResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.components.AuthorizeActionPackRequest;
            import com.glean.api_client.glean_api_client.models.operations.AuthorizeActionPackResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    AuthorizeActionPackResponse res = sdk.tools().authorizeActionPack()
                            .actionPackId("<id>")
                            .authorizeActionPackRequest(AuthorizeActionPackRequest.builder()
                                .returnUrl("https://merry-allocation.org/")
                                .build())
                            .call();

                    if (res.authorizeActionPackResponse().isPresent()) {
                        System.out.println(res.authorizeActionPackResponse().get());
                    }
                }
            }
components:
  schemas:
    ActionAuthType:
      type: string
      description: |
        Authentication mechanism used by an action pack.
          - `AUTH_USER_OAUTH`: Requires per-user OAuth consent to the third-party tool.
          - `AUTH_ADMIN`: Uses a service-account / admin-owned credential. End users do not authorize individually.
          - `AUTH_NONE`: Action pack requires no authentication.
      enum:
        - AUTH_USER_OAUTH
        - AUTH_ADMIN
        - AUTH_NONE
    AuthorizeActionPackRequest:
      type: object
      required:
        - returnUrl
      properties:
        returnUrl:
          type: string
          description: |
            URL on the customer's domain to redirect the end user's browser back to after the third-party OAuth
            callback completes. Must be present in the tenant's return URL allowlist.
    AuthorizeActionPackResponse:
      type: object
      required:
        - redirectUrl
      properties:
        redirectUrl:
          type: string
          description: |
            URL that the customer UI should navigate the end user to in order to begin the third-party OAuth flow.
            After the user consents, control returns to `returnUrl` from the request.
    ToolsCallResponse:
      type: object
      properties:
        rawResponse:
          additionalProperties: true
          type: object
          description: The raw response from the tool
        error:
          type: string
          description: The error message if applicable
    ToolsCallRequest:
      type: object
      required:
        - name
        - parameters
      properties:
        name:
          type: string
          description: Required name of the tool to execute
        parameters:
          type: object
          description: The parameters for the tool. Each key is the name of the parameter and the value is the parameter object.
          additionalProperties:
            $ref: '#/components/schemas/ToolsCallParameter'
    ActionPackAuthStatusResponse:
      type: object
      required:
        - actionPack
      properties:
        actionPack:
          $ref: '#/components/schemas/ActionPackAuthStatus'
          description: |
            Action-pack-scoped authentication status. Wrapped under `actionPack` so the response
            shape clearly conveys that the status applies to the whole pack and leaves room to add
            sibling fields (e.g. per-action status) later without a breaking change.
    ActionPackAuthStatus:
      type: object
      required:
        - authenticated
        - authType
      properties:
        authenticated:
          type: boolean
          description: Whether the calling user is already authenticated to the tool backing the action pack.
        authType:
          $ref: '#/components/schemas/ActionAuthType'
    Tool:
      type: object
      properties:
        type:
          type: string
          description: Type of tool (READ, WRITE)
          enum:
            - READ
            - WRITE
        name:
          type: string
          description: Unique identifier for the tool
        displayName:
          type: string
          description: Human-readable name
        description:
          type: string
          description: LLM friendly description of the tool
        parameters:
          type: object
          description: The parameters for the tool. Each key is the name of the parameter and the value is the parameter object.
          additionalProperties:
            $ref: '#/components/schemas/ToolParameter'
    ToolParameter:
      type: object
      properties:
        description:
