                  type: string
            name:
              description: The name of the parameter
              type: string
            possibleValues:
              description: The possible values for the parameter. Can contain only primitive values or arrays of primitive values.
              type: array
              items:
                type: string
            properties:
              additionalProperties: *ref_0
              description: When type is 'object', this describes the structure of the object.
              type: object
            type:
              description: Parameter type (string, number, boolean, object, array)
              enum: *ref_1
              type: string
        name:
          description: The name of the parameter
          type: string
        possibleValues:
          description: The possible values for the parameter. Can contain only primitive values or arrays of primitive values.
          type: array
          items:
            type: string
        properties:
          additionalProperties: *ref_0
          description: When type is 'object', this describes the structure of the object.
          type: object
        type:
          description: Parameter type (string, number, boolean, object, array)
          enum: *ref_1
          type: string
    ToolsListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
    ToolsCallParameter:
      required: &ref_2
        - name
        - value
      type: object
      properties:
        items:
          description: The value of the parameter (for array types)
