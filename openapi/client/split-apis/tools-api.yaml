  /rest/api/v1/actions/actionpack/{actionPackId}/auth:
    get:
      tags:
        - Tools
      summary: Get end-user authentication status for an action pack.
      description: |
        Reports whether the calling user is already authenticated against the third-party
        tool backing the specified action pack. Intended for headless / server-driven clients
        that render an "Authorize" prompt when the user has not yet consented to the tool.
      operationId: getActionPackAuthStatus
      x-visibility: Preview
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionPackAuthStatusResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Action pack not found
        '429':
          description: Too Many Requests
      security:
        - APIToken: []
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.tools.get_action_pack_auth_status(action_pack_id="<id>")

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.tools.getActionPackAuthStatus("<id>");

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Tools.GetActionPackAuthStatus(ctx, \"<id>\")\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.ActionPackAuthStatusResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.operations.GetActionPackAuthStatusResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    GetActionPackAuthStatusResponse res = sdk.tools().getActionPackAuthStatus()
