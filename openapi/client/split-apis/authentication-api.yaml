paths:
  /rest/api/v1/checkdatasourceauth:
    post:
      tags:
        - Authentication
      summary: Check datasource authorization
      description: |
        Returns all datasource instances that require per-user OAuth authorization
        for the authenticated user, along with a transient auth token that can be
        appended to auth URLs to complete OAuth flows.

        Clients construct the full OAuth URL by combining the backend base URL,
        the `authUrlRelativePath` from each instance, and the transient auth token:
        `<backend>/<authUrlRelativePath>?transient_auth_token=<token>`.
      operationId: checkdatasourceauth
      x-visibility: Public
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckDatasourceAuthResponse'
        '401':
          description: Not Authorized
        '429':
          description: Too Many Requests
      security:
        - APIToken: []
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.authentication.checkdatasourceauth()

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.authentication.checkdatasourceauth();

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Authentication.Checkdatasourceauth(ctx)\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.CheckDatasourceAuthResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.operations.CheckdatasourceauthResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    CheckdatasourceauthResponse res = sdk.authentication().checkdatasourceauth()
                            .call();

                    if (res.checkDatasourceAuthResponse().isPresent()) {
                        System.out.println(res.checkDatasourceAuthResponse().get());
                    }
                }
            }
  /rest/api/v1/createauthtoken:
    post:
      tags:
        - Authentication
      summary: Create authentication token
      description: |
        Creates an authentication token for the authenticated user. These are
        specifically intended to be used with the [Web SDK](https://developers.glean.com/web).

        Note: The tokens generated from this endpoint are **not** valid tokens
        for use with the Client API (e.g. `/rest/api/v1/*`).
      operationId: createauthtoken
      x-visibility: Public
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAuthTokenResponse'
        '400':
          description: Invalid Request
        '401':
          description: Not Authorized
        '429':
          description: Too Many Requests
      security:
        - APIToken: []
      x-speakeasy-name-override: createToken
      x-speakeasy-group: client.authentication
      x-codeSamples:
        - lang: Python
          label: Python (API Client)
          source: |-
            from glean.api_client import Glean
            import os


            with Glean(
                api_token=os.getenv("GLEAN_API_TOKEN", ""),
                server_url="https://mycompany-be.glean.com",
            ) as glean:

                res = glean.client.authentication.create_token()

                # Handle response
                print(res)
        - lang: JavaScript
          label: Typescript (API Client)
          source: |-
            import { Glean } from "@gleanwork/api-client";

            const glean = new Glean({
              apiToken: process.env["GLEAN_API_TOKEN"] ?? "",
              serverURL: "https://mycompany-be.glean.com",
            });

            async function run() {
              const result = await glean.client.authentication.createToken();

              console.log(result);
            }

            run();
        - lang: Go
          label: Go (API Client)
          source: "package main\n\nimport(\n\t\"context\"\n\t\"os\"\n\tapiclientgo \"github.com/gleanwork/api-client-go\"\n\t\"log\"\n)\n\nfunc main() {\n    ctx := context.Background()\n\n    s := apiclientgo.New(\n        apiclientgo.WithSecurity(os.Getenv(\"GLEAN_API_TOKEN\")),\n        apiclientgo.WithServerURL(\"https://mycompany-be.glean.com\"),\n    )\n\n    res, err := s.Client.Authentication.CreateToken(ctx)\n    if err != nil {\n        log.Fatal(err)\n    }\n    if res.CreateAuthTokenResponse != nil {\n        // handle response\n    }\n}"
        - lang: Java
          label: Java (API Client)
          source: |-
            package hello.world;

            import com.glean.api_client.glean_api_client.Glean;
            import com.glean.api_client.glean_api_client.models.operations.CreateauthtokenResponse;
            import java.lang.Exception;

            public class Application {

                public static void main(String[] args) throws Exception {

                    Glean sdk = Glean.builder()
                            .apiToken(System.getenv().getOrDefault("GLEAN_API_TOKEN", ""))
                        .build();

                    CreateauthtokenResponse res = sdk.client().authentication().createToken()
                            .call();

                    if (res.createAuthTokenResponse().isPresent()) {
                        System.out.println(res.createAuthTokenResponse().get());
                    }
                }
            }
components:
  schemas:
    AuthStatus:
      type: string
      description: The per-user authorization status for a datasource.
      enum:
        - DISABLED
        - AWAITING_AUTH
        - AUTHORIZED
        - STALE_OAUTH
        - SEG_MIGRATION
      x-enum-varnames:
        - AUTH_STATUS_DISABLED
        - AUTH_STATUS_AWAITING_AUTH
        - AUTH_STATUS_AUTHORIZED
        - AUTH_STATUS_STALE_OAUTH
        - AUTH_STATUS_SEG_MIGRATION
    CreateAuthTokenResponse:
      required:
        - token
        - expirationTime
      properties:
        token:
          type: string
          description: An authentication token that can be passed to any endpoint via Bearer Authentication
        expirationTime:
          description: Unix timestamp for when this token expires (in seconds since epoch UTC).
          type: integer
          format: int64
    UnauthorizedDatasourceInstance:
      description: |
        A datasource instance that could not return results for this request because the user has not completed or has expired per-user OAuth.
      properties:
        datasourceInstance:
          type: string
          description: |
            The instance identifier (e.g. "github", "github_enterprise_0", "slack_0"). Matches the instance names used in datasource configuration.
          example: slack_0
        displayName:
          type: string
          description: Human-readable name of the datasource instance for display.
          example: Slack
        authStatus:
          $ref: '#/components/schemas/AuthStatus'
        authUrlRelativePath:
          type: string
          description: |
            Relative path to initiate or resume OAuth for the current user and instance, including a one-time authentication token as a query parameter. Clients should prepend their configured Glean backend base URL.
    CheckDatasourceAuthResponse:
      required:
        - unauthorizedDatasourceInstances
      properties:
        unauthorizedDatasourceInstances:
          type: array
          description: |
            Datasource instances that require per-user OAuth authorization. Empty when all datasources are authorized.
          items:
            $ref: '#/components/schemas/UnauthorizedDatasourceInstance'
  securitySchemes:
    APIToken:
      scheme: bearer
      type: http
