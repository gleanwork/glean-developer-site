# Input form trigger
trigger:
  type: INPUT_FORM
  inputFields:
    - displayName: Account Name
      description: Target account for outreach
      type: TEXT
    - displayName: Region
      type: SELECT
      defaultValue: AMER
      options:
        - value: AMER
        - value: EMEA
        - value: APJ
    - displayName: Due Date
      type: DATE
      optional: true
