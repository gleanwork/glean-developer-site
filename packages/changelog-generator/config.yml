owner: gleanwork
baseBranch: main
repos:
  - { repo: api-client-java, category: 'API Clients', parser: speakeasy }
  - { repo: api-client-python, category: 'API Clients', parser: speakeasy }
  - { repo: api-client-typescript, category: 'API Clients', parser: speakeasy }
  - { repo: api-client-go, category: 'API Clients', parser: speakeasy }
  - {
      repo: glean-agent-toolkit,
      category: 'Glean Agent Toolkit',
      parser: commitizen,
    }
  - { repo: mcp-server, category: 'MCP', parser: lerna-changelog }
  - { repo: mcp-config, category: 'MCP', parser: lerna-changelog }
  - { repo: configure-mcp-server, category: 'MCP', parser: lerna-changelog }
  - {
      repo: glean-indexing-sdk,
      category: 'Glean Indexing SDK',
      parser: commitizen,
    }
  - { repo: langchain-glean, category: 'langchain-glean', parser: commitizen }

openapi:
  enabled: true
  repo: { owner: gleanwork, repo: open-api }
  paths:
    - final_specs/client_rest.yaml
    - final_specs/indexing.yaml
    - source_specs/client_rest.yaml
    - source_specs/indexing.yaml
  lookbackDays: 30
  diffEnabled: true
  diffEngine: openapi-changes
